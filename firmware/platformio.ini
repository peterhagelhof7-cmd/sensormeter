; ============================================================================
; Sensormeter - WT32-ETH01
; PlatformIO Projektkonfiguration
; ============================================================================

[env:wt32-eth01]
platform = espressif32
board = esp32dev
framework = arduino

monitor_speed = 115200
upload_speed = 921600

; ConfigManager/BrandingManager verwenden zur Laufzeit LittleFS
; (LittleFS.begin()) - ohne dieses Flag baut "pio run --target uploadfs"
; faelschlich ein SPIFFS-Image, das nicht zur LittleFS-formatierten
; Partition passt (nachgezogen von Sensormeter WLAN, wo das bereits so
; gesetzt war).
board_build.filesystem = littlefs

; PlatformIOs implizites "default.csv"-Schema reserviert eine Datenpartition,
; die genauso gross ist wie eine der beiden OTA-App-Partitionen (~1,31 MB) -
; tatsaechlich genutzt werden dort aber nur config.xml, history.csv und
; optional ein 1 KB Branding-Logo (ein paar KB insgesamt). "min_spiffs.csv"
; (im Framework-Paket enthalten, kein eigenes File noetig) gibt der
; Datenpartition nur noch 128 KB und je Ota-Slot dafuer ~1,88 MB statt
; ~1,31 MB - deutlich mehr Luft, ohne OTA-Sicherheit oder Funktionalitaet
; zu verlieren. Siehe docs/entscheidungen.md.
board_build.partitions = min_spiffs.csv

; tinyxml2 liegt vendort in lib/tinyxml2/ (nur die 2 benoetigten Quelldateien,
; siehe lib/tinyxml2/README.md) - keine lib_deps-Deklaration noetig.

lib_deps =
    adafruit/DHT sensor library@^1.4.6
    adafruit/Adafruit Unified Sensor@^1.1.14
    ; I2C-Lesepfad fuer "Sensor 2" (BME280-/AHT20-Modul, siehe
    ; sensormeter-family/repo/module-design/README.md "Firmware-Luecke")
    adafruit/Adafruit BME280 Library@^2.2.4
    adafruit/Adafruit AHTX0@^2.0.5
    ; Erweiterte I2C-Lesepfade fuer "Sensor 2" (Firmware-Luecke aus
    ; sensormeter-family/repo/module-design/README.md): Luftdruck (BMP280),
    ; Helligkeit (BH1750), Luftguete (ENS160).
    adafruit/Adafruit BMP280 Library@^3.0.0
    claws/BH1750@^1.3.0
    adafruit/ENS160 - Adafruit Fork@^3.0.1
    adafruit/Adafruit SSD1306@^2.5.13
    ; treibt das optionale externe RJ45-Display-Steckmodul (SH1107, siehe
    ; sensormeter-family/repo/module-design/sh1107-display-modul.md)
    adafruit/Adafruit SH110X@^2.1.13
    adafruit/Adafruit GFX Library@^1.11.9
    esp32async/ESPAsyncWebServer@^3.11.2
    esp32async/AsyncTCP@^3.4.10
    bblanchon/ArduinoJson@^7.4.3
    0neblock/SNMP_Agent@^2.1.0
    marian-craciunescu/ESP32Ping@^1.7
    knolleary/PubSubClient@^2.8

build_flags =
    -D CORE_DEBUG_LEVEL=1
